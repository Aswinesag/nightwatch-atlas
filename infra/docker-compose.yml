services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      - zookeeper

  harvester-gdelt:
    build: ../services/harvester-gdelt
    env_file:
      - ./../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  harvester-opensky:
    build: ../services/harvester-opensky
    env_file:
      - ./../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSKY_CREDENTIALS_FILE: /app/credentials.json
    volumes:
      - ./../credentials.json:/app/credentials.json:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  harvester-otx:
    build: ../services/harvester-otx
    env_file:
      - ./../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  harvester-gfw:
    build: ../services/harvester-gfw
    env_file:
      - ./../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  processor-gdelt:
    build:
      context: ..
      dockerfile: services/processor-ai/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "/app/services/processor-ai/gdelt_processor_real.py"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  processor-opensky:
    build:
      context: ..
      dockerfile: services/processor-ai/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "/app/services/processor-ai/opensky_processor.py"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  processor-otx:
    build:
      context: ..
      dockerfile: services/processor-ai/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "/app/services/processor-ai/otx_processor.py"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  processor-gfw:
    build:
      context: ..
      dockerfile: services/processor-ai/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "/app/services/processor-ai/gfw_processor.py"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  control-plane:
    build:
      context: ..
      dockerfile: apps/control-plane/Dockerfile
    env_file:
      - ./../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://intel:intel@postgres:5432/intel
    command: ["python", "main_real.py"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      processor-gdelt:
        condition: service_started
      processor-opensky:
        condition: service_started
      processor-otx:
        condition: service_started
      processor-gfw:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: intel
      POSTGRES_DB: intel
    ports:
      - "5432:5432"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - control-plane
